apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-postgres-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rahulselvam/microservices-database.git'
    targetRevision: HEAD
    # ArgoCD will scan this directory and apply all YAML files inside it
    path: argocd/deployments 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true